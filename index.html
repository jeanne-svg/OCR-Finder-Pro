<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>IC 印字精密辨識儀 Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.0/dist/tesseract.min.js"></script>
<style>
  :root{
    --bg: #0a0c0f;
    --panel: #12161b;
    --panel-2: #171c22;
    --line: #232a32;
    --text: #e6ebf0;
    --text-dim: #7c8896;
    --accent: #29d3c8;
    --accent-dim: #1a7f79;
    --ok: #22c55e;
    --ok-dim: #123d22;
    --warn: #eab308;
    --warn-dim: #453a0a;
    --bad: #ef4444;
    --bad-dim: #3d1414;
    --idle: #5b6773;
    --mono: 'IBM Plex Mono', ui-monospace, monospace;
    --sans: 'Inter', system-ui, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:var(--sans); -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;
  }
  body{ min-height:100vh; display:flex; flex-direction:column; }

  header{
    padding:14px 16px 10px; display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg); z-index:20;
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand .dot{ width:9px; height:9px; border-radius:50%; background:var(--idle); box-shadow:0 0 8px var(--idle); transition:.25s;}
  .brand .dot.scanning{ background:var(--accent); box-shadow:0 0 10px var(--accent); animation:pulse 1.2s infinite; }
  .brand .dot.ok{ background:var(--ok); box-shadow:0 0 10px var(--ok); }
  .brand .dot.warn{ background:var(--warn); box-shadow:0 0 10px var(--warn); }
  .brand .dot.bad{ background:var(--bad); box-shadow:0 0 10px var(--bad); }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.35;} }
  .brand h1{ font-size:15px; margin:0; font-weight:700; letter-spacing:.02em; }
  .brand small{ display:block; font-family:var(--mono); font-size:10.5px; color:var(--text-dim); letter-spacing:.04em; }
  .iconbtn{
    width:36px; height:36px; border-radius:10px; border:1px solid var(--line); background:var(--panel);
    color:var(--text-dim); display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .iconbtn:active{ background:var(--panel-2); }

  .cam-wrap{
    position:relative; width:100%; height:45vh; min-height:280px; background:#000; overflow:hidden;
    border-bottom:1px solid var(--line);
  }
  video{ width:100%; height:100%; object-fit:cover; display:block; transition: transform 0.1s ease-out; }
  .cam-placeholder{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; background:radial-gradient(circle at 50% 40%, #141a20, #0a0c0f);
  }
  .cam-placeholder svg{ opacity:.5; }
  .startbtn{
    background:var(--accent); color:#04211f; border:none; padding:11px 22px; border-radius:999px;
    font-weight:700; font-size:14px; cursor:pointer; font-family:var(--sans);
  }
  .cam-placeholder p{ color:var(--text-dim); font-size:12.5px; margin:0; text-align:center; padding:0 20px; }

  /* 感應框設計：引導使用者將晶片放在中心 */
  .scan-frame{
    position:absolute; left:15%; top:23%; width:70%; height:54%;
    border:3px solid var(--idle); border-radius:14px; transition:border-color .25s, box-shadow .25s;
    box-shadow:0 0 0 2000px rgba(0,0,0,.55);
    pointer-events:none;
  }
  .scan-frame.scanning{ border-color:var(--accent); box-shadow:0 0 0 2000px rgba(0,0,0,.45), 0 0 18px -2px var(--accent); }
  .scan-frame.ok{ border-color:var(--ok); box-shadow:0 0 0 2000px rgba(0,0,0,.4), 0 0 22px -2px var(--ok); }
  .scan-frame.warn{ border-color:var(--warn); box-shadow:0 0 0 2000px rgba(0,0,0,.4), 0 0 22px -2px var(--warn); }
  .scan-frame.bad{ border-color:var(--bad); box-shadow:0 0 0 2000px rgba(0,0,0,.4), 0 0 22px -2px var(--bad); }

  /* 內圈靶心引導：提醒用戶將文字套進該範圍，避開白膠 */
  .scan-target-box{
    position:absolute; left:20%; top:25%; width:60%; height:50%;
    border:1px dashed rgba(41, 211, 200, 0.4); border-radius:8px;
    pointer-events:none; box-sizing:border-box;
  }

  .scanline{
    position:absolute; left:2%; width:96%; height:2px; background:linear-gradient(90deg, transparent, var(--accent), transparent);
    top:8%; opacity:0; pointer-events:none;
  }
  .scanline.active{ animation:sweep 2.0s linear infinite; opacity:.9; }
  @keyframes sweep{ 0%{ top:8%; } 100%{ top:92%; } }

  .cam-status{
    position:absolute; left:0; right:0; bottom:10px; display:flex; justify-content:center; pointer-events:none;
  }
  .cam-status span{
    font-family:var(--mono); font-size:11.5px; letter-spacing:.03em; color:var(--text);
    background:rgba(10,12,15,.85); border:1px solid var(--line); padding:6px 14px; border-radius:999px;
    text-align:center; min-width:220px; backdrop-filter:blur(4px);
  }

  .cam-tools{ position:absolute; right:10px; top:10px; display:flex; flex-direction:column; gap:8px; }
  .cam-tools button{
    width:38px; height:38px; border-radius:10px; border:1px solid rgba(255,255,255,.15);
    background:rgba(10,12,15,.6); backdrop-filter:blur(4px); color:#fff; display:flex; align-items:center;
    justify-content:center; cursor:pointer;
  }
  .cam-tools button:active{ background:rgba(10,12,15,.9); }

  /* ---- content ---- */
  main{ flex:1; padding:14px 14px 90px; display:flex; flex-direction:column; gap:14px; }

  .card{ background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px; }
  .card h2{
    margin:0 0 10px; font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim);
    display:flex; align-items:center; justify-content:space-between; font-weight:700;
  }
  .badge{
    font-family:var(--mono); font-size:10.5px; padding:2px 8px; border-radius:999px; border:1px solid var(--line);
    color:var(--text-dim); text-transform:none; letter-spacing:0;
  }
  .badge.ok{ color:var(--ok); border-color:var(--ok-dim); background:var(--ok-dim); }
  .badge.warn{ color:var(--warn); border-color:var(--warn-dim); background:var(--warn-dim); }
  .badge.bad{ color:var(--bad); border-color:var(--bad-dim); background:var(--bad-dim); }

  .ocr-text{
    font-family:var(--mono); font-size:14px; line-height:1.65; white-space:pre-wrap; word-break:break-word;
    color:var(--text); min-height:44px; padding:10px 12px; background:var(--panel-2); border-radius:10px;
    border:1px solid var(--line);
  }
  .ocr-text.empty{ color:var(--text-dim); font-style:italic; }
  .row{ display:flex; gap:8px; margin-top:10px; }
  .btn{
    flex:1; border:1px solid var(--line); background:var(--panel-2); color:var(--text); border-radius:10px;
    padding:10px; font-size:13px; font-weight:600; cursor:pointer; font-family:var(--sans);
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .btn:active{ background:#1e252c; }
  .btn.primary{ background:var(--accent); color:#04211f; border-color:var(--accent); }
  .btn.ghost{ background:transparent; }
  .btn svg{ width:15px; height:15px; }

  .match-name{ font-family:var(--mono); font-size:12.5px; color:var(--accent); margin-bottom:8px; }

  .cmp-line{
    display:flex; align-items:flex-start; gap:9px; padding:7px 0; border-bottom:1px dashed var(--line);
    font-family:var(--mono); font-size:13px;
  }
  .cmp-line:last-child{ border-bottom:none; }
  .cmp-icon{ flex:0 0 auto; width:18px; height:18px; margin-top:1px; }
  .cmp-text{ flex:1; word-break:break-word; }
  .cmp-text .std{ color:var(--text); }
  .cmp-text .got{ color:var(--text-dim); font-size:11.5px; margin-top:2px; }
  .cmp-line.match .std{ color:var(--ok); }
  .cmp-line.mismatch .std{ color:var(--bad); }
  .placeholder-dim{ color:var(--text-dim); font-size:13px; font-family:var(--sans); }

  /* standards manager */
  textarea{
    width:100%; min-height:96px; background:var(--panel-2); color:var(--text); border:1px solid var(--line);
    border-radius:10px; padding:10px 12px; font-family:var(--mono); font-size:13px; resize:vertical;
  }
  input[type=text]{
    width:100%; background:var(--panel-2); color:var(--text); border:1px solid var(--line);
    border-radius:10px; padding:10px 12px; font-family:var(--sans); font-size:13px; margin-bottom:8px;
  }
  .std-item{
    background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:8px;
  }
  .std-item-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .std-item-head b{ font-size:13px; }
  .std-item-actions{ display:flex; gap:8px; }
  .std-item pre{ margin:0; font-family:var(--mono); font-size:11.5px; color:var(--text-dim); white-space:pre-wrap; }
  .del-btn{ background:none; border:none; color:var(--bad); cursor:pointer; font-size:11.5px; font-family:var(--sans); padding:2px 4px; }
  .edit-btn{ background:none; border:none; color:var(--accent); cursor:pointer; font-size:11.5px; font-family:var(--sans); padding:2px 4px; }

  .toast{
    position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); opacity:0;
    background:var(--panel-2); border:1px solid var(--line); color:var(--text); padding:10px 18px; border-radius:999px;
    font-size:13px; z-index:100; transition:.25s; pointer-events:none; font-family:var(--sans);
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  #previewCanvas{
    display: none;
    width: 100%;
    margin-top: 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #000;
  }
  canvas{ display:none; }

  details{ }
  details > summary{ list-style:none; cursor:pointer; display:flex; align-items:center; justify-content:space-between; }
  details > summary::-webkit-details-marker{ display:none; }
  .chev{ transition:transform .2s; color:var(--text-dim); }
  details[open] .chev{ transform:rotate(180deg); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="dot" id="statusDot"></span>
    <div>
      <h1>IC 印字辨識儀 Pro</h1>
      <small id="statusLabel">STANDBY</small>
    </div>
  </div>
  <button class="iconbtn" id="settingsToggle" title="標準文字設定">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"></path></svg>
  </button>
</header>

<div class="cam-wrap" id="camWrap">
  <video id="video" playsinline muted autoplay></video>
  <div class="cam-placeholder" id="camPlaceholder">
    <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#7c8896" stroke-width="1.6"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
    <button class="startbtn" id="startBtn">啟動相機</button>
    <p>請將 IC 的文字行盡量放滿在虛線框內，避開上下白膠</p>
  </div>
  <div class="scan-frame" id="scanFrame">
    <div class="scan-target-box"></div>
  </div>
  <div class="scanline" id="scanLine"></div>
  <div class="cam-tools">
    <button id="shotBtn" title="截圖">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
    </button>
    <button id="zoomInBtn" title="放大">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>
    <button id="zoomOutBtn" title="縮小">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>
  </div>
  <div class="cam-status"><span id="camStatusText">尚未啟動相機</span></div>
</div>

<main>
  
<div class="row" style="margin-top: 0; margin-bottom: 6px;">
    <button class="btn primary" id="copyBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"></path></svg>
      複製文字
    </button>
    <button class="btn ghost" id="resetBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 102.13-9.36L1 10"></path></svg>
      手動重置
    </button>
  </div>

  <div class="card" style="margin-top: 0;">
    <h2>OCR 辨識結果 <span class="badge" id="ocrBadge">等待中</span></h2>
    <div class="ocr-text empty" id="ocrText">尚無辨識結果</div>
    <canvas id="previewCanvas"></canvas> 
  </div>

  <div class="card">
    <h2>比對結果 <span class="badge" id="cmpBadge">—</span></h2>
    <div class="match-name" id="matchName" style="display:none;"></div>
    <div id="cmpList"><div class="placeholder-dim">辨識到文字後，將自動與標準文字逐行比對。</div></div>
  </div>

  <div class="card" id="settingsCard">
    <details id="settingsDetails">
      <summary><h2 style="margin:0; border:none;">標準文字管理 <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg></h2></summary>
      <div style="margin-top:12px;">
        <input type="text" id="stdNameInput" placeholder="標準文字名稱（例：SEC 137）">
        <textarea id="stdTextInput" placeholder="貼上多行標準文字，逐行比對&#10;例：&#10;SEC 137&#10;K4A8G08&#10;5WD BCWE&#10;GKD52592"></textarea>
        <div class="row" id="editorActionsRow">
          <button class="btn primary" id="addStdBtn">新增標準文字</button>
        </div>
        <div style="margin-top:14px;" id="stdList"></div>
      </div>
    </details>
  </div>
</main>

<div class="toast" id="toast"></div>
<canvas id="captureCanvas"></canvas>
<canvas id="shotCanvas"></canvas>

<script>
(function(){
  "use strict";

  // ---------- 狀態配置 ----------
  const STORAGE_KEY = "ic_ocr_standards_v1";
  let standards = [];
  let stream = null;
  let videoTrack = null;
  let hasHardwareZoom = false;
  let zoomLevel = 1.0; 
  const ZOOM_MIN = 1.0;
  const ZOOM_MAX = 4.0;
  const ZOOM_STEP = 0.5;

  let worker = null;
  let workerReady = false;
  let ocrTimer = null;
  let isRecognizing = false;
  let state = "idle"; 
  let emptyStreak = 0;
  let lastResultText = "";

  // 穩定判定
  let candidateText = "";
  let stableCount = 0;
  const STABLE_THRESHOLD = 3; 

  const OCR_INTERVAL_IDLE = 160; 
  const OCR_INTERVAL_LOCKED = 400;
  const EMPTY_STREAK_TO_RESET = 3;
  const MIN_TEXT_LEN = 5; 

  let editingIndex = null;

  // ---------- 元素取得 ----------
  const video = document.getElementById("video");
  const camPlaceholder = document.getElementById("camPlaceholder");
  const startBtn = document.getElementById("startBtn");
  const camWrap = document.getElementById("camWrap");
  const scanFrame = document.getElementById("scanFrame");
  const scanLine = document.getElementById("scanLine");
  const camStatusText = document.getElementById("camStatusText");
  const statusDot = document.getElementById("statusDot");
  const statusLabel = document.getElementById("statusLabel");
  const ocrText = document.getElementById("ocrText");
  const ocrBadge = document.getElementById("ocrBadge");
  const cmpBadge = document.getElementById("cmpBadge");
  const cmpList = document.getElementById("cmpList");
  const matchName = document.getElementById("matchName");
  const copyBtn = document.getElementById("copyBtn");
  const resetBtn = document.getElementById("resetBtn");
  const shotBtn = document.getElementById("shotBtn");
  const zoomInBtn = document.getElementById("zoomInBtn");
  const zoomOutBtn = document.getElementById("zoomOutBtn");
  const settingsToggle = document.getElementById("settingsToggle");
  const settingsDetails = document.getElementById("settingsDetails");
  const stdNameInput = document.getElementById("stdNameInput");
  const stdTextInput = document.getElementById("stdTextInput");
  const addStdBtn = document.getElementById("addStdBtn");
  const editorActionsRow = document.getElementById("editorActionsRow");
  const stdList = document.getElementById("stdList");
  const toast = document.getElementById("toast");
  const captureCanvas = document.getElementById("captureCanvas");
  const previewCanvas = document.getElementById("previewCanvas");
  const shotCanvas = document.getElementById("shotCanvas");

  // ---------- 資料庫存取 ----------
  function loadStandards(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      standards = raw ? JSON.parse(raw) : [];
    }catch(e){ standards = []; }
    renderStdList();
  }
  function saveStandards(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(standards));
  }

  function renderStdList(){
    if(standards.length === 0){
      stdList.innerHTML = '<div class="placeholder-dim">尚未新增任何標準文字。</div>';
      return;
    }
    stdList.innerHTML = "";
    standards.forEach((s, idx) => {
      const div = document.createElement("div");
      div.className = "std-item";
      
      const head = document.createElement("div");
      head.className = "std-item-head";
      
      const b = document.createElement("b");
      b.textContent = s.name || ("未命名 " + (idx+1));
      
      const actions = document.createElement("div");
      actions.className = "std-item-actions";
      
      const edit = document.createElement("button");
      edit.className = "edit-btn";
      edit.textContent = "修改";
      edit.onclick = () => enterEditMode(idx);
      
      const del = document.createElement("button");
      del.className = "del-btn";
      del.textContent = "刪除";
      del.onclick = () => {
        if(editingIndex === idx) exitEditMode();
        standards.splice(idx, 1);
        saveStandards();
        renderStdList();
        showToast("已刪除該標準文字");
      };
      
      actions.appendChild(edit);
      actions.appendChild(del);
      head.appendChild(b);
      head.appendChild(actions);
      
      const pre = document.createElement("pre");
      pre.textContent = s.text;
      
      div.appendChild(head);
      div.appendChild(pre);
      stdList.appendChild(div);
    });
  }

  function enterEditMode(index) {
    editingIndex = index;
    const target = standards[index];
    stdNameInput.value = target.name;
    stdTextInput.value = target.text;
    
    settingsDetails.open = true;
    stdNameInput.scrollIntoView({ behavior:"smooth", block:"center" });
    stdNameInput.focus();

    editorActionsRow.innerHTML = `
      <button class="btn primary" id="saveStdBtn">儲存修改</button>
      <button class="btn ghost" id="cancelEditBtn">取消修改</button>
    `;

    document.getElementById("saveStdBtn").onclick = saveEdit;
    document.getElementById("cancelEditBtn").onclick = exitEditMode;
  }

  function exitEditMode() {
    editingIndex = null;
    stdNameInput.value = "";
    stdTextInput.value = "";
    editorActionsRow.innerHTML = `<button class="btn primary" id="addStdBtn">新增標準文字</button>`;
    document.getElementById("addStdBtn").onclick = addNewStandard;
  }

  function saveEdit() {
    if(editingIndex === null) return;
    const name = stdNameInput.value.trim();
    const text = stdTextInput.value.replace(/\r\n/g, "\n").trim();
    if(!text){ showToast("請輸入標準文字內容"); return; }

    standards[editingIndex] = {
      name: name || ("標準文字 " + (editingIndex + 1)),
      text: text
    };
    saveStandards();
    renderStdList();
    exitEditMode();
    showToast("修改已儲存");
  }

  function addNewStandard() {
    const name = stdNameInput.value.trim();
    const text = stdTextInput.value.replace(/\r\n/g, "\n").trim();
    if(!text){ showToast("請輸入標準文字內容"); return; }
    standards.push({ name: name || ("標準文字 " + (standards.length+1)), text });
    saveStandards();
    renderStdList();
    stdNameInput.value = "";
    stdTextInput.value = "";
    showToast("已新增標準文字");
  }

  addStdBtn.addEventListener("click", addNewStandard);

  settingsToggle.addEventListener("click", () => {
    settingsDetails.open = !settingsDetails.open;
    settingsDetails.scrollIntoView({ behavior:"smooth", block:"start" });
  });

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 1800);
  }

  function setStatus(kind, label, camText){
    statusDot.className = "dot" + (kind ? " " + kind : "");
    statusLabel.textContent = label;
    if(camText) camStatusText.textContent = camText;
  }
  function setFrame(kind){
    scanFrame.className = "scan-frame" + (kind ? " " + kind : "");
  }

  // ---------- 相機控制 ----------
  async function startCamera(){
    try{
      if(stream){ stream.getTracks().forEach(t => t.stop()); }
      setStatus(null, "相機啟動中", "啟動相機中...");
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment", width:{ ideal:1920 }, height:{ ideal:1080 } },
        audio: false
      });
      video.srcObject = stream;
      await video.play();

      const tracks = stream.getVideoTracks();
      if(tracks.length > 0){
        videoTrack = tracks[0];
        const capabilities = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
        hasHardwareZoom = !!capabilities.zoom;
      }

      zoomLevel = 1.0;
      applyZoom();

      camPlaceholder.style.display = "none";
      setStatus("scanning", "掃描中", "自動掃描中...");
      setFrame("scanning");
      scanLine.classList.add("active");
      await ensureWorker();
      resetToIdle(true);
      scheduleOcr(200);
    }catch(err){
      console.error(err);
      setStatus("bad", "相機錯誤", "無法啟動相機：" + err.message);
      showToast("相機啟動失敗，請確認權限");
    }
  }

  startBtn.addEventListener("click", startCamera);

  function applyZoom(){
    if(!stream) return;
    
    if(hasHardwareZoom && videoTrack){
      video.style.transform = "scale(1)"; 
      const capabilities = videoTrack.getCapabilities();
      const min = capabilities.zoom.min || 1;
      const max = capabilities.zoom.max || 3;
      const mappedZoom = min + ((zoomLevel - ZOOM_MIN) / (ZOOM_MAX - ZOOM_MIN)) * (max - min);
      videoTrack.applyConstraints({
        advanced: [{ zoom: mappedZoom }]
      }).catch(err => {
        video.style.transform = `scale(${zoomLevel})`;
      });
    } else {
      video.style.transform = `scale(${zoomLevel})`;
    }
    camStatusText.textContent = `倍率: ${zoomLevel.toFixed(1)}x`;
  }

  zoomInBtn.addEventListener("click", () => {
    if(!stream){ showToast("請先啟動相機"); return; }
    if(zoomLevel < ZOOM_MAX){ zoomLevel = Math.min(ZOOM_MAX, zoomLevel + ZOOM_STEP); applyZoom(); }
  });

  zoomOutBtn.addEventListener("click", () => {
    if(!stream){ showToast("請先啟動相機"); return; }
    if(zoomLevel > ZOOM_MIN){ zoomLevel = Math.max(ZOOM_MIN, zoomLevel - ZOOM_STEP); applyZoom(); }
  });

  async function ensureWorker(){
    if(workerReady) return;
    setStatus(null, "載入引擎", "載入 OCR 核心...");
    worker = await Tesseract.createWorker("eng", 1, { logger: () => {} });
    await worker.setParameters({
      tessedit_char_whitelist: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ- ",
      tessedit_pageseg_mode: "6" 
    });
    workerReady = true;
  }

  // ---------- 核心升級：極致動態感應框剪裁與中心聚焦（Saliency Slicing） ----------
  function getCropRect(){
    const vw = video.videoWidth, vh = video.videoHeight;
    if(!vw || !vh) return null;
    const cw = camWrap.clientWidth, ch = camWrap.clientHeight;
    const videoAspect = vw / vh;
    const containerAspect = cw / ch;
    let renderW, renderH, offsetX, offsetY;
    if(videoAspect > containerAspect){
      renderH = ch; renderW = ch * videoAspect;
      offsetX = (renderW - cw) / 2; offsetY = 0;
    }else{
      renderW = cw; renderH = cw / videoAspect;
      offsetX = 0; offsetY = (renderH - ch) / 2;
    }
    const scale = vw / renderW;
    const boxRect = scanFrame.getBoundingClientRect();
    const wrapRect = camWrap.getBoundingClientRect();
    
    // 1. 全新精簡剪裁核心：
    // 只拿中心「虛線靶心」所在的寬 55%、高 60% 的空間。
    // 這能完全消除旁邊「金手指黃色反光」以及「白膠」造成的邊界雜訊。
    const cropBoxX = (boxRect.left - wrapRect.left) + (boxRect.width * 0.225);
    const cropBoxY = (boxRect.top - wrapRect.top) + (boxRect.height * 0.20);
    const cropBoxW = boxRect.width * 0.55;
    const cropBoxH = boxRect.height * 0.60;
    
    let sx = (cropBoxX + offsetX) * scale;
    let sy = (cropBoxY + offsetY) * scale;
    let sw = cropBoxW * scale;
    let sh = cropBoxH * scale;

    if(!hasHardwareZoom && zoomLevel > 1.0){
      const dW = sw / zoomLevel; const dH = sh / zoomLevel;
      sx = sx + (sw - dW) / 2; sy = sy + (sh - dH) / 2;
      sw = dW; sh = dH;
    }

    return { sx, sy, sw, sh };
  }

  // ---------- 核心升級：局部自適應閾值二值化 (Adaptive Thresholding) 與高倍率金字塔重建 ----------
  function captureCroppedCanvas(){
    const rect = getCropRect();
    if(!rect) return null;
    
    // 2. 超解析度圖像金字塔重建 (放大 3.5 倍)：
    // 解決距離太遠時字元解析度不足、過小被過濾的問題。
    const upscale = 3.5; 
    captureCanvas.width = Math.max(1, Math.round(rect.sw * upscale));
    captureCanvas.height = Math.max(1, Math.round(rect.sh * upscale));
    const ctx = captureCanvas.getContext("2d");
    
    // 平滑插值補償，減少邊緣鋸齒
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "high";
    ctx.drawImage(video, rect.sx, rect.sy, rect.sw, rect.sh, 0, 0, captureCanvas.width, captureCanvas.height);
    
    try {
      const imgData = ctx.getImageData(0, 0, captureCanvas.width, captureCanvas.height);
      const data = imgData.data;
      const w = captureCanvas.width;
      const h = captureCanvas.height;
      const len = data.length;

      // a. 計算灰階
      const gray = new Uint8Array(w * h);
      for (let i = 0; i < len; i += 4) {
        gray[i/4] = data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114;
      }

      // b. 局部自適應二值化 (Adaptive Thresholding)
      // 使用局部 25x25 像素視窗來動態計算局部的光照度，解決「強白膠」和「暗晶片」在同一圖中造成曝光不均的問題。
      const binary = new Uint8Array(w * h);
      const S = Math.round(w / 8) | 1; // 視窗尺寸
      const T = 12; // 偏移常數 (常規白紙黑字用 15, 這邊用 12 以防筆劃過細)
      
      // 使用積分圖 (Integral Image) 加速計算
      const intImg = new Uint32Array(w * h);
      for (let y = 0; y < h; y++) {
        let sum = 0;
        for (let x = 0; x < w; x++) {
          const idx = y * w + x;
          sum += gray[idx];
          if (y === 0) {
            intImg[idx] = sum;
          } else {
            intImg[idx] = intImg[(y - 1) * w + x] + sum;
          }
        }
      }

      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const idx = y * w + x;
          const x1 = Math.max(0, x - S / 2);
          const x2 = Math.min(w - 1, x + S / 2);
          const y1 = Math.max(0, y - S / 2);
          const y2 = Math.min(h - 1, y + S / 2);
          const count = (x2 - x1) * (y2 - y1);
          
          const i11 = intImg[Math.round(y1 * w + x1)];
          const i12 = intImg[Math.round(y1 * w + x2)];
          const i21 = intImg[Math.round(y2 * w + x1)];
          const i22 = intImg[Math.round(y2 * w + x2)];
          const sum = i22 - i12 - i21 + i11;

          // 局部自適應條件：如果該點灰階高於局部平均值減去 T，則判定為文字（白），否則為底色（黑）
          if (gray[idx] * count < sum * (100 - T) / 100) {
            binary[idx] = 0; // 背景
          } else {
            binary[idx] = 255; // 前景(文字)
          }
        }
      }

      // c. 智慧形狀特徵與孔洞濾除 (Blob Analysis Filter)
      // 對於大片白膠，或綠色過孔（非常圓、長寬比接近 1:1 且極小）進行形狀排除
      const visited = new Uint8Array(w * h);
      for(let y = 0; y < h; y++){
        for(let x = 0; x < w; x++){
          const idx = y * w + x;
          if(binary[idx] === 255 && visited[idx] === 0){
            const queue = [idx];
            visited[idx] = 1;
            let head = 0;
            let minX = x, maxX = x, minY = y, maxY = y;

            while(head < queue.length){
              const curr = queue[head++];
              const cx = curr % w;
              const cy = Math.floor(curr / w);
              
              if(cx < minX) minX = cx; if(cx > maxX) maxX = cx;
              if(cy < minY) minY = cy; if(cy > maxY) maxY = cy;

              const neighbors = [
                {x: cx+1, y: cy}, {x: cx-1, y: cy},
                {x: cx, y: cy+1}, {x: cx, y: cy-1}
              ];
              for(const n of neighbors){
                if(n.x >= 0 && n.x < w && n.y >= 0 && n.y < h){
                  const nidx = n.y * w + n.x;
                  if(binary[nidx] === 255 && visited[nidx] === 0){
                    visited[nidx] = 1;
                    queue.push(nidx);
                  }
                }
              }
            }
            
            const area = queue.length;
            const bW = (maxX - minX) + 1;
            const bH = (maxY - minY) + 1;
            const aspectRatio = bW / bH;

            // 形狀規則判定：
            // 1. 如果面積太小 (微小雜訊) 或太大 (白膠邊塊)
            // 2. 如果是一個「非常圓」(寬高比在 0.85 ~ 1.15 之間) 且面積偏小的結構 (PCB 典型過孔)
            const isCircularVia = (aspectRatio > 0.85 && aspectRatio < 1.15 && area < 400);
            const isGiantWhiteGlue = (area > (w * h * 0.15) || bH > (h * 0.85));

            if(area < 25 || isCircularVia || isGiantWhiteGlue){ 
              for(const pixel of queue){
                binary[pixel] = 0; // 消除
              }
            }
          }
        }
      }

      // 將濾波後的完美黑白高反差文字影像寫回 Canvas
      for (let i = 0; i < len; i += 4) {
        const val = binary[i / 4];
        data[i] = val; data[i+1] = val; data[i+2] = val;
      }
      ctx.putImageData(imgData, 0, 0);

      // (除錯用) 如果想看影像預處理效果，可以開啟 previewCanvas 顯示
      previewCanvas.style.display = "block";
      previewCanvas.width = w; previewCanvas.height = h;
      previewCanvas.getContext("2d").putImageData(imgData, 0, 0);

    } catch(e) {
      console.warn("自適應前處理失敗，降級備援:", e);
    }
    return captureCanvas;
  }

  // ---------- OCR 控制常式 ----------
  function scheduleOcr(delay){
    clearTimeout(ocrTimer);
    ocrTimer = setTimeout(runOcr, delay != null ? delay : (state === "idle" ? OCR_INTERVAL_IDLE : OCR_INTERVAL_LOCKED));
  }

  async function runOcr(){
    if(!stream || !workerReady || isRecognizing){ scheduleOcr(); return; }
    const canvas = captureCroppedCanvas();
    if(!canvas){ scheduleOcr(); return; }
    isRecognizing = true;
    try{
      const { data } = await worker.recognize(canvas);
      const rawText = (data && data.text ? data.text : "").trim();
      handleOcrResult(rawText);
    }catch(err){
      console.error(err);
    }finally{
      isRecognizing = false;
      scheduleOcr();
    }
  }

  // 強化行過濾：字元過短、雜訊點直接排除
  function cleanText(t){
    return t.split("\n")
            .map(l => l.trim())
            .filter(l => {
              const noSpace = l.replace(/\s/g, "");
              return noSpace.length >= 4; // 只保留 4 個字元以上的行，能有效避開隨機小髒點
            })
            .join("\n");
  }

  function handleOcrResult(rawText){
    const cleaned = cleanText(rawText);
    const meaningfulLen = cleaned.replace(/\s/g, "").length;

    if(state === "idle"){
      if(meaningfulLen >= MIN_TEXT_LEN){
        if(cleaned === candidateText){
          stableCount++;
          setStatus("scanning", "掃描中", `保持穩定... 驗證中 (${stableCount}/${STABLE_THRESHOLD})`);
          if(stableCount >= STABLE_THRESHOLD){
            lockResult(cleaned);
            candidateText = ""; stableCount = 0;
          }
        } else {
          candidateText = cleaned;
          stableCount = 1;
          setStatus("scanning", "讀取中", "偵測到核心印字，正在核對...");
        }
      }else{
        stableCount = 0; candidateText = "";
        setStatus("scanning", "掃描中", "自動掃描中 (請將晶片放於虛線內)");
      }
    }else if(state === "locked"){
      if(meaningfulLen < MIN_TEXT_LEN){
        emptyStreak++;
        if(emptyStreak >= EMPTY_STREAK_TO_RESET){ resetToIdle(); }
      }else{
        emptyStreak = 0;
      }
    }
  }

  function lockResult(text){
    state = "locked";
    emptyStreak = 0;
    lastResultText = text;
    scanLine.classList.remove("active");
    ocrText.textContent = text;
    ocrText.classList.remove("empty");
    ocrBadge.textContent = "已鎖定";
    ocrBadge.className = "badge ok";

    const cmp = compareAgainstStandards(text);
    renderComparison(cmp);

    if(cmp.kind === "green"){
      setFrame("ok"); setStatus("ok", "完全符合", "比對成功：完全符合，移開 IC 以重新掃描");
    }else if(cmp.kind === "yellow"){
      setFrame("warn"); setStatus("warn", "部分符合", "部分符合，移開 IC 以重新掃描");
    }else{
      setFrame("bad"); setStatus("bad", "完全不符", "未通過比對，移開 IC 以重新掃描");
    }
  }

  function resetToIdle(silent){
    state = "idle"; emptyStreak = 0; lastResultText = ""; candidateText = ""; stableCount = 0;
    scanLine.classList.add("active");
    setFrame("scanning");
    ocrText.textContent = "尚無辨識結果"; ocrText.classList.add("empty");
    ocrBadge.textContent = "等待中"; ocrBadge.className = "badge";
    cmpBadge.textContent = "—"; cmpBadge.className = "badge";
    matchName.style.display = "none";
    cmpList.innerHTML = '<div class="placeholder-dim">辨識到文字後，將自動與標準文字逐行比對。</div>';
    if(!silent) setStatus("scanning", "掃描中", "已重置，請再次將晶片置於中央");
  }

  resetBtn.addEventListener("click", () => resetToIdle());

  // ---------- 模糊比對演算法 ----------
  function normLine(l){
    return l.toUpperCase().replace(/[^A-Z0-9-]/g, "");
  }

  function getLevenshteinDistance(a, b) {
    const tmp = [];
    for (let i = 0; i <= a.length; i++) tmp[i] = [i];
    for (let j = 0; j <= b.length; j++) tmp[0][j] = j;
    for (let i = 1; i <= a.length; i++) {
      for (let j = 1; j <= b.length; j++) {
        tmp[i][j] = Math.min(
          tmp[i - 1][j] + 1,
          tmp[i][j - 1] + 1,
          tmp[i - 1][j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1)
        );
      }
    }
    return tmp[a.length][b.length];
  }

  function areCharsConfusable(c1, c2) {
    if (c1 === c2) return true;
    const sets = [
      ["8", "B", "E", "S"],
      ["0", "O", "D", "Q", "G", "C"],
      ["1", "I", "L", "T", "J"],
      ["5", "S"],
      ["2", "Z"]
    ];
    for (const set of sets) {
      if (set.includes(c1) && set.includes(c2)) return true;
    }
    return false;
  }

  function isFuzzyMatch(std, ocr) {
    const nStd = normLine(std);
    const nOcr = normLine(ocr);
    if (nStd === nOcr) return true;
    if (nStd.length >= 4 && (nOcr.includes(nStd) || nStd.includes(nOcr))) return true;

    if (Math.abs(nStd.length - nOcr.length) <= 2) {
      const dist = getLevenshteinDistance(nStd, nOcr);
      if (dist <= 2) {
        let unpardonableDiff = 0;
        const maxLen = Math.max(nStd.length, nOcr.length);
        for (let i = 0; i < maxLen; i++) {
          const sC = nStd[i] || ""; const oC = nOcr[i] || "";
          if (sC !== oC && !areCharsConfusable(sC, oC)) { unpardonableDiff++; }
        }
        if (unpardonableDiff <= 1) return true; 
      }
    }
    return false;
  }

  function compareAgainstStandards(ocrTextRaw){
    if(standards.length === 0){
      return { kind: "gray", stdName: null, lines: [], noStandards: true };
    }
    const ocrLines = ocrTextRaw.split("\n").filter(l => l.trim().length > 0);

    let best = null;
    standards.forEach(s => {
      const stdLines = s.text.split("\n").map(l => l.trim()).filter(l => l.length > 0);
      if(stdLines.length === 0) return;
      
      const lineResults = stdLines.map(stdLine => {
        let matchedOcrLine = null;
        for(let i = 0; i < ocrLines.length; i++){
          if(isFuzzyMatch(stdLine, ocrLines[i])){ matchedOcrLine = ocrLines[i]; break; }
        }
        return { std: stdLine, matched: matchedOcrLine !== null, got: matchedOcrLine };
      });
      
      const matchCount = lineResults.filter(r => r.matched).length;
      const ratio = matchCount / stdLines.length;
      if(!best || ratio > best.ratio){
        best = { ratio, stdName: s.name, lines: lineResults };
      }
    });

    if(!best) return { kind: "gray", stdName: null, lines: [], noStandards: true };
    let kind = "red";
    if(best.ratio >= 0.99) kind = "green";
    else if(best.ratio > 0) kind = "yellow";
    return { kind, stdName: best.stdName, lines: best.lines, ratio: best.ratio };
  }

  function renderComparison(cmp){
    if(cmp.noStandards){
      matchName.style.display = "none";
      cmpBadge.textContent = "無標準文字"; cmpBadge.className = "badge";
      cmpList.innerHTML = '<div class="placeholder-dim">請先在下方新增標準文字以進行比對。</div>';
      return;
    }
    matchName.style.display = "block";
    matchName.textContent = "比對對象：" + cmp.stdName;

    if(cmp.kind === "green"){
      cmpBadge.textContent = "完全符合"; cmpBadge.className = "badge ok";
    }else if(cmp.kind === "yellow"){
      cmpBadge.textContent = "部分符合"; cmpBadge.className = "badge warn";
    }else{
      cmpBadge.textContent = "完全不符"; cmpBadge.className = "badge bad";
    }

    cmpList.innerHTML = "";
    cmp.lines.forEach(r => {
      const row = document.createElement("div");
      row.className = "cmp-line " + (r.matched ? "match" : "mismatch");
      const icon = document.createElement("div");
      icon.className = "cmp-icon";
      icon.innerHTML = r.matched
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';
      const textWrap = document.createElement("div");
      textWrap.className = "cmp-text";
      const stdDiv = document.createElement("div");
      stdDiv.className = "std";
      stdDiv.textContent = r.std;
      textWrap.appendChild(stdDiv);
      if(!r.matched){
        const gotDiv = document.createElement("div");
        gotDiv.className = "got";
        gotDiv.textContent = "（未在辨識結果中找到對應行）";
        textWrap.appendChild(gotDiv);
      } else if (r.std !== r.got) {
        const gotDiv = document.createElement("div");
        gotDiv.className = "got";
        gotDiv.style.color = "var(--warn)";
        gotDiv.textContent = `（相近字校正 ➔ 抓取到: "${r.got}"）`;
        textWrap.appendChild(gotDiv);
      }
      row.appendChild(icon);
      row.appendChild(textWrap);
      cmpList.appendChild(row);
    });
  }

  // ---------- 輔助操作 ----------
  copyBtn.addEventListener("click", async () => {
    const text = ocrText.textContent;
    if(!text || ocrText.classList.contains("empty")){ showToast("尚無文字可複製"); return; }
    try{
      await navigator.clipboard.writeText(text); showToast("已複製到剪貼簿");
    }catch(e){
      const ta = document.createElement("textarea"); ta.value = text;
      document.body.appendChild(ta); ta.select(); document.execCommand("copy");
      document.body.removeChild(ta); showToast("已複製到剪貼簿");
    }
  });

  shotBtn.addEventListener("click", () => {
    if(!stream){ showToast("請先啟動相機"); return; }
    shotCanvas.width = video.videoWidth; shotCanvas.height = video.videoHeight;
    shotCanvas.getContext("2d").drawImage(video, 0, 0, shotCanvas.width, shotCanvas.height);
    shotCanvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `ic-scan-${new Date().toISOString().replace(/[:.]/g, "-")}.png`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      showToast("截圖已儲存");
    }, "image/png");
  });

  // ---------- 初始化 ----------
  loadStandards();
  resetToIdle(true);
})();
</script>
