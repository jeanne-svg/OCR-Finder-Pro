<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>IC 印字精密辨識儀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.0/dist/tesseract.min.js"></script>
<style>
  :root{
    --bg: #0a0c0f; --panel: #12161b; --panel-2: #171c22; --line: #232a32;
    --text: #e6ebf0; --text-dim: #7c8896; --accent: #29d3c8; --accent-dim: #1a7f79;
    --ok: #22c55e; --ok-dim: #123d22; --warn: #eab308; --warn-dim: #453a0a;
    --bad: #ef4444; --bad-dim: #3d1414; --idle: #5b6773;
    --mono: 'IBM Plex Mono', ui-monospace, monospace; --sans: 'Inter', system-ui, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--text); font-family:var(--sans);
    -webkit-tap-highlight-color:transparent; overscroll-behavior:none; }
  body{ min-height:100vh; display:flex; flex-direction:column; }

  header{ padding:14px 16px 10px; display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg); z-index:20; }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand .dot{ width:9px; height:9px; border-radius:50%; background:var(--idle); box-shadow:0 0 8px var(--idle); transition:.25s;}
  .brand .dot.scanning{ background:var(--accent); box-shadow:0 0 10px var(--accent); animation:pulse 1.2s infinite; }
  .brand .dot.ok{ background:var(--ok); box-shadow:0 0 10px var(--ok); }
  .brand .dot.warn{ background:var(--warn); box-shadow:0 0 10px var(--warn); }
  .brand .dot.bad{ background:var(--bad); box-shadow:0 0 10px var(--bad); }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.35;} }
  .brand h1{ font-size:15px; margin:0; font-weight:700; letter-spacing:.02em; }
  .brand small{ display:block; font-family:var(--mono); font-size:10.5px; color:var(--text-dim); letter-spacing:.04em; }
  .iconbtn{ width:36px; height:36px; border-radius:10px; border:1px solid var(--line); background:var(--panel);
    color:var(--text-dim); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .iconbtn:active{ background:var(--panel-2); }

  .cam-wrap{ position:relative; width:100%; height:45vh; min-height:260px; background:#000; overflow:hidden;
    border-bottom:1px solid var(--line); }
  video{ width:100%; height:100%; object-fit:cover; display:block; transition: transform 0.1s ease-out; }
  .cam-placeholder{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; background:radial-gradient(circle at 50% 40%, #141a20, #0a0c0f); z-index:8; }
  .cam-placeholder svg{ opacity:.5; }
  .startbtn{ background:var(--accent); color:#04211f; border:none; padding:11px 22px; border-radius:999px;
    font-weight:700; font-size:14px; cursor:pointer; font-family:var(--sans); }
  .cam-placeholder p{ color:var(--text-dim); font-size:12.5px; margin:0; text-align:center; padding:0 24px; }

  .zone-guide{ position:absolute; left:6%; top:14%; width:88%; height:68%;
    border:2px dashed rgba(255,255,255,.22); border-radius:16px;
    box-shadow:0 0 0 1200px rgba(0,0,0,.4); pointer-events:none; z-index:2; }
  #scanLayer{ position:absolute; inset:0; z-index:3; }
  .auto-frame{ position:absolute; border:3px solid var(--idle); border-radius:10px;
    transition:border-color .2s, box-shadow .2s, left .15s, top .15s, width .15s, height .15s;
    box-shadow:0 0 14px -3px rgba(0,0,0,.6); }
  .auto-frame.scanning{ border-color:var(--accent); box-shadow:0 0 16px -3px var(--accent); }
  .auto-frame.ok{ border-color:var(--ok); box-shadow:0 0 18px -3px var(--ok); }
  .auto-frame.warn{ border-color:var(--warn); box-shadow:0 0 18px -3px var(--warn); }
  .auto-frame.bad{ border-color:var(--bad); box-shadow:0 0 18px -3px var(--bad); }
  .slot-label{ position:absolute; top:-22px; left:0; font-family:var(--mono); font-size:10.5px; letter-spacing:.04em;
    color:var(--text); background:rgba(10,12,15,.75); border:1px solid var(--line); padding:2px 8px; border-radius:999px;
    white-space:nowrap; }

  .cam-status{ position:absolute; left:0; right:0; bottom:10px; display:flex; justify-content:center; pointer-events:none; z-index:6; }
  .cam-status span{ font-family:var(--mono); font-size:11.5px; letter-spacing:.03em; color:var(--text);
    background:rgba(10,12,15,.8); border:1px solid var(--line); padding:5px 12px; border-radius:999px; text-align:center; }

  .cam-tools{ position:absolute; right:10px; top:10px; display:flex; flex-direction:column; gap:8px; z-index:9; }
  .cam-tools button{ width:38px; height:38px; border-radius:10px; border:1px solid rgba(255,255,255,.15);
    background:rgba(10,12,15,.55); backdrop-filter:blur(4px); color:#fff; display:flex; align-items:center;
    justify-content:center; cursor:pointer; }
  .cam-tools button:active{ background:rgba(10,12,15,.8); }
  .zoom-indicator{ font-family:var(--mono); font-size:10px; color:var(--text); text-align:center;
    background:rgba(10,12,15,.55); border-radius:6px; padding:2px 0; }

  main{ flex:1; padding:14px 14px 90px; display:flex; flex-direction:column; gap:14px; }

  .card{ background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px; }
  .card h2{ margin:0 0 10px; font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim);
    display:flex; align-items:center; justify-content:space-between; font-weight:700; }
  .badge{ font-family:var(--mono); font-size:10.5px; padding:2px 8px; border-radius:999px; border:1px solid var(--line);
    color:var(--text-dim); text-transform:none; letter-spacing:0; }
  .badge.ok{ color:var(--ok); border-color:var(--ok-dim); background:var(--ok-dim); }
  .badge.warn{ color:var(--warn); border-color:var(--warn-dim); background:var(--warn-dim); }
  .badge.bad{ color:var(--bad); border-color:var(--bad-dim); background:var(--bad-dim); }

  .ocr-text{ font-family:var(--mono); font-size:14px; line-height:1.65; white-space:pre-wrap; word-break:break-word;
    color:var(--text); min-height:44px; padding:10px 12px; background:var(--panel-2); border-radius:10px; border:1px solid var(--line); }
  .ocr-text.empty{ color:var(--text-dim); font-style:italic; }
  .row{ display:flex; gap:8px; margin-top:10px; }
  .row:first-child{ margin-top:0; }
  .btn{ flex:1; border:1px solid var(--line); background:var(--panel-2); color:var(--text); border-radius:10px;
    padding:10px; font-size:13px; font-weight:600; cursor:pointer; font-family:var(--sans);
    display:flex; align-items:center; justify-content:center; gap:6px; }
  .btn:active{ background:#1e252c; }
  .btn.primary{ background:var(--accent); color:#04211f; border-color:var(--accent); }
  .btn.ghost{ background:transparent; }
  .btn svg{ width:15px; height:15px; }

  .match-name{ font-family:var(--mono); font-size:12.5px; color:var(--accent); margin:10px 0 6px; }

  .cmp-line{ display:flex; align-items:flex-start; gap:9px; padding:7px 0; border-bottom:1px dashed var(--line);
    font-family:var(--mono); font-size:13px; }
  .cmp-line:last-child{ border-bottom:none; }
  .cmp-icon{ flex:0 0 auto; width:18px; height:18px; margin-top:1px; }
  .cmp-text{ flex:1; word-break:break-word; }
  .cmp-text .std{ color:var(--text); }
  .cmp-text .got{ color:var(--text-dim); font-size:11.5px; margin-top:2px; }
  .cmp-line.match .std{ color:var(--ok); }
  .cmp-line.mismatch .std{ color:var(--bad); }
  .placeholder-dim{ color:var(--text-dim); font-size:13px; font-family:var(--sans); }

  textarea{ width:100%; min-height:96px; background:var(--panel-2); color:var(--text); border:1px solid var(--line);
    border-radius:10px; padding:10px 12px; font-family:var(--mono); font-size:13px; resize:vertical; }
  input[type=text]{ width:100%; background:var(--panel-2); color:var(--text); border:1px solid var(--line);
    border-radius:10px; padding:10px 12px; font-family:var(--sans); font-size:13px; margin-bottom:8px; }
  .std-item{ background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:8px; }
  .std-item-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .std-item-head b{ font-size:13px; }
  .std-item-actions{ display:flex; gap:8px; }
  .std-item pre{ margin:0; font-family:var(--mono); font-size:11.5px; color:var(--text-dim); white-space:pre-wrap; }
  .del-btn{ background:none; border:none; color:var(--bad); cursor:pointer; font-size:11.5px; font-family:var(--sans); padding:2px 4px; }
  .edit-btn{ background:none; border:none; color:var(--accent); cursor:pointer; font-size:11.5px; font-family:var(--sans); padding:2px 4px; }

  .toast{ position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); opacity:0;
    background:var(--panel-2); border:1px solid var(--line); color:var(--text); padding:10px 18px; border-radius:999px;
    font-size:13px; z-index:100; transition:.25s; pointer-events:none; font-family:var(--sans); }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  canvas{ display:none; }
  details > summary{ list-style:none; cursor:pointer; display:flex; align-items:center; justify-content:space-between; }
  details > summary::-webkit-details-marker{ display:none; }
  .chev{ transition:transform .2s; color:var(--text-dim); }
  details[open] .chev{ transform:rotate(180deg); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="dot" id="statusDot"></span>
    <div>
      <h1>IC 印字辨識儀</h1>
      <small id="statusLabel">STANDBY</small>
    </div>
  </div>
  <button class="iconbtn" id="settingsToggle" title="標準文字設定">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"></path></svg>
  </button>
</header>

<div class="cam-wrap" id="camWrap">
  <video id="video" playsinline muted autoplay></video>
  <div class="cam-placeholder" id="camPlaceholder">
    <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#7c8896" stroke-width="1.6"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
    <button class="startbtn" id="startBtn">啟動相機</button>
    <p>將 IC 置於掃描區內，系統會自動偵測並辨識，不論有幾顆</p>
  </div>
  <div class="zone-guide" id="zoneEl"></div>
  <div id="scanLayer"></div>
  <div class="cam-tools">
    <button id="shotBtn" title="截圖">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
    </button>
    <button id="zoomInBtn" title="放大">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>
    <div class="zoom-indicator" id="zoomIndicator">1.0x</div>
    <button id="zoomOutBtn" title="縮小">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>
  </div>
  <div class="cam-status"><span id="camStatusText">尚未啟動相機</span></div>
</div>

<main>
  <div class="row" style="margin:0;">
    <button class="btn ghost" id="resetBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 102.13-9.36L1 10"></path></svg>
      清除全部並重新掃描
    </button>
  </div>

  <div id="resultsContainer">
    <div class="card"><div class="placeholder-dim">尚未偵測到 IC，請將晶片置於掃描區內。</div></div>
  </div>

  <div class="card" id="settingsCard">
    <details id="settingsDetails">
      <summary><h2 style="margin:0; border:none;">標準文字管理 <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg></h2></summary>
      <div style="margin-top:12px;">
        <input type="text" id="stdNameInput" placeholder="標準文字名稱（例：SEC 137）">
        <textarea id="stdTextInput" placeholder="貼上多行標準文字，逐行比對&#10;例：&#10;SEC 137&#10;K4A8G08&#10;5WD BCWE&#10;GKD52592"></textarea>
        <div class="row" id="editorActionsRow">
          <button class="btn primary" id="addStdBtn">新增標準文字</button>
        </div>
        <div style="margin-top:14px;" id="stdList"></div>
      </div>
    </details>
  </div>
</main>

<div class="toast" id="toast"></div>
<canvas id="captureCanvas"></canvas>
<canvas id="shotCanvas"></canvas>

<script>
(function(){
  "use strict";

  // ================= 標準文字（localStorage） =================
  const STORAGE_KEY = "ic_ocr_standards_v1";
  let standards = [];
  let editingIndex = null;

  const stdNameInput = document.getElementById("stdNameInput");
  const stdTextInput = document.getElementById("stdTextInput");
  const addStdBtn = document.getElementById("addStdBtn");
  const editorActionsRow = document.getElementById("editorActionsRow");
  const stdList = document.getElementById("stdList");
  const settingsToggle = document.getElementById("settingsToggle");
  const settingsDetails = document.getElementById("settingsDetails");

  function loadStandards(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      standards = raw ? JSON.parse(raw) : [];
    }catch(e){ standards = []; }
    renderStdList();
  }
  function saveStandards(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(standards)); }

  function renderStdList(){
    if(standards.length === 0){
      stdList.innerHTML = '<div class="placeholder-dim">尚未新增任何標準文字。</div>';
      return;
    }
    stdList.innerHTML = "";
    standards.forEach((s, idx) => {
      const div = document.createElement("div");
      div.className = "std-item";
      const head = document.createElement("div");
      head.className = "std-item-head";
      const b = document.createElement("b");
      b.textContent = s.name || ("未命名 " + (idx+1));
      const actions = document.createElement("div");
      actions.className = "std-item-actions";
      const edit = document.createElement("button");
      edit.className = "edit-btn"; edit.textContent = "修改";
      edit.onclick = () => enterEditMode(idx);
      const del = document.createElement("button");
      del.className = "del-btn"; del.textContent = "刪除";
      del.onclick = () => {
        if(editingIndex === idx) exitEditMode();
        standards.splice(idx, 1);
        saveStandards(); renderStdList();
        showToast("已刪除該標準文字");
      };
      actions.appendChild(edit); actions.appendChild(del);
      head.appendChild(b); head.appendChild(actions);
      const pre = document.createElement("pre");
      pre.textContent = s.text;
      div.appendChild(head); div.appendChild(pre);
      stdList.appendChild(div);
    });
  }

  function enterEditMode(index){
    editingIndex = index;
    const target = standards[index];
    stdNameInput.value = target.name;
    stdTextInput.value = target.text;
    settingsDetails.open = true;
    stdNameInput.scrollIntoView({ behavior:"smooth", block:"center" });
    stdNameInput.focus();
    editorActionsRow.innerHTML = `
      <button class="btn primary" id="saveStdBtn">儲存修改</button>
      <button class="btn ghost" id="cancelEditBtn">取消修改</button>`;
    document.getElementById("saveStdBtn").onclick = saveEdit;
    document.getElementById("cancelEditBtn").onclick = exitEditMode;
  }
  function exitEditMode(){
    editingIndex = null;
    stdNameInput.value = ""; stdTextInput.value = "";
    editorActionsRow.innerHTML = `<button class="btn primary" id="addStdBtn">新增標準文字</button>`;
    document.getElementById("addStdBtn").onclick = addNewStandard;
  }
  function saveEdit(){
    if(editingIndex === null) return;
    const name = stdNameInput.value.trim();
    const text = stdTextInput.value.replace(/\r\n/g, "\n").trim();
    if(!text){ showToast("請輸入標準文字內容"); return; }
    standards[editingIndex] = { name: name || ("標準文字 " + (editingIndex + 1)), text };
    saveStandards(); renderStdList(); exitEditMode();
    showToast("修改已儲存");
  }
  function addNewStandard(){
    const name = stdNameInput.value.trim();
    const text = stdTextInput.value.replace(/\r\n/g, "\n").trim();
    if(!text){ showToast("請輸入標準文字內容"); return; }
    standards.push({ name: name || ("標準文字 " + (standards.length+1)), text });
    saveStandards(); renderStdList();
    stdNameInput.value = ""; stdTextInput.value = "";
    showToast("已新增標準文字");
  }
  addStdBtn.addEventListener("click", addNewStandard);
  settingsToggle.addEventListener("click", () => {
    settingsDetails.open = !settingsDetails.open;
    settingsDetails.scrollIntoView({ behavior:"smooth", block:"start" });
  });

  // ================= toast / clipboard =================
  const toast = document.getElementById("toast");
  let toastTimer = null;
  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
  }
  function copyTextToClipboard(text){
    navigator.clipboard.writeText(text).then(() => {
      showToast("已複製到剪貼簿");
    }).catch(() => {
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      try{ document.execCommand("copy"); showToast("已複製到剪貼簿"); }
      catch(e){ showToast("複製失敗，請手動選取"); }
      document.body.removeChild(ta);
    });
  }

  // ================= 相機 / 變焦 =================
  const video = document.getElementById("video");
  const camPlaceholder = document.getElementById("camPlaceholder");
  const startBtn = document.getElementById("startBtn");
  const camWrap = document.getElementById("camWrap");
  const zoneEl = document.getElementById("zoneEl");
  const scanLayer = document.getElementById("scanLayer");
  const camStatusText = document.getElementById("camStatusText");
  const statusDot = document.getElementById("statusDot");
  const statusLabel = document.getElementById("statusLabel");
  const shotBtn = document.getElementById("shotBtn");
  const zoomInBtn = document.getElementById("zoomInBtn");
  const zoomOutBtn = document.getElementById("zoomOutBtn");
  const zoomIndicator = document.getElementById("zoomIndicator");
  const resultsContainer = document.getElementById("resultsContainer");
  const resetBtn = document.getElementById("resetBtn");
  const captureCanvas = document.getElementById("captureCanvas");
  const shotCanvas = document.getElementById("shotCanvas");

  let stream = null;
  let videoTrack = null;
  let hasHardwareZoom = false;
  let zoomLevel = 1.0;
  const ZOOM_MIN = 1.0, ZOOM_MAX = 4.0, ZOOM_STEP = 0.5;

  let worker = null;
  let workerReady = false;
  let mainTimer = null;
  let isRecognizing = false;
  let uidCounter = 1;

  const STABLE_THRESHOLD = 2;
  const TICK_DELAY = 60;
  const EMPTY_STREAK_TO_RESET = 5;
  const MIN_TEXT_LEN = 3;
  const MAX_REGIONS = 4;
  const MISSING_GRACE = 5;

  let regionStates = [];

  function setStatus(kind, label){
    statusDot.className = "dot" + (kind ? " " + kind : "");
    if(label) statusLabel.textContent = label;
  }

  async function startCamera(){
    try{
      setStatus(null, "啟動中");
      camStatusText.textContent = "啟動相機與辨識引擎中...";
      const camPromise = navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment", width:{ ideal:1920 }, height:{ ideal:1080 } },
        audio: false
      });
      const workerPromise = ensureWorker();
      const [camStream] = await Promise.all([camPromise, workerPromise]);
      stream = camStream;
      video.srcObject = stream;
      await video.play();

      const tracks = stream.getVideoTracks();
      if(tracks.length > 0){
        videoTrack = tracks[0];
        const capabilities = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
        hasHardwareZoom = !!capabilities.zoom;
      }
      zoomLevel = 1.0;
      applyZoom();

      camPlaceholder.style.display = "none";
      // 確保 video 已有實際尺寸後才開始主迴圈
      waitForVideoReady().then(() => scheduleTick(150));
    }catch(err){
      console.error(err);
      setStatus("bad", "相機錯誤");
      camStatusText.textContent = "無法啟動相機：" + err.message;
      showToast("相機啟動失敗，請確認權限");
    }
  }
  startBtn.addEventListener("click", startCamera);

  function waitForVideoReady(){
    return new Promise(resolve => {
      function check(){
        if(video.videoWidth > 0 && video.videoHeight > 0) resolve();
        else requestAnimationFrame(check);
      }
      check();
    });
  }

  function applyZoom(){
    if(!stream) return;
    if(hasHardwareZoom && videoTrack){
      video.style.transform = "scale(1)";
      const capabilities = videoTrack.getCapabilities();
      const min = capabilities.zoom.min || 1;
      const max = capabilities.zoom.max || 3;
      const mapped = min + ((zoomLevel - ZOOM_MIN) / (ZOOM_MAX - ZOOM_MIN)) * (max - min);
      videoTrack.applyConstraints({ advanced: [{ zoom: mapped }] }).catch(err => {
        console.warn("硬體變焦失敗，切換為數位變焦備援", err);
        hasHardwareZoom = false;
        video.style.transform = `scale(${zoomLevel})`;
      });
    } else {
      video.style.transform = `scale(${zoomLevel})`;
    }
    zoomIndicator.textContent = zoomLevel.toFixed(1) + "x";
  }
  zoomInBtn.addEventListener("click", () => {
    if(!stream){ showToast("請先啟動相機"); return; }
    if(zoomLevel < ZOOM_MAX){ zoomLevel = Math.min(ZOOM_MAX, zoomLevel + ZOOM_STEP); applyZoom(); }
    else showToast("已達最大倍率");
  });
  zoomOutBtn.addEventListener("click", () => {
    if(!stream){ showToast("請先啟動相機"); return; }
    if(zoomLevel > ZOOM_MIN){ zoomLevel = Math.max(ZOOM_MIN, zoomLevel - ZOOM_STEP); applyZoom(); }
    else showToast("已達最小倍率");
  });

  resetBtn.addEventListener("click", () => {
    regionStates = [];
    renderAllRegionCards();
    updateHeaderStatus();
    showToast("已清除，重新自動偵測中...");
  });

  // ================= Tesseract worker =================
  async function ensureWorker(){
    if(workerReady) return;
    worker = await Tesseract.createWorker("eng", 1, { logger: () => {} });
    await worker.setParameters({
      tessedit_char_whitelist: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ -./:+",
      tessedit_pageseg_mode: "3"   // 全自動版面分析：可自動辨識出多塊分開的文字（對應多顆IC）
    });
    workerReady = true;
  }

  // ================= 幾何座標對應（含縮放/變焦） =================
  function getViewportMapping(){
    const vw = video.videoWidth, vh = video.videoHeight;
    if(!vw || !vh) return null;
    const cw = camWrap.clientWidth, ch = camWrap.clientHeight;
    const videoAspect = vw / vh, containerAspect = cw / ch;
    let renderW, renderH, offsetX, offsetY;
    if(videoAspect > containerAspect){
      renderH = ch; renderW = ch * videoAspect; offsetX = (renderW - cw) / 2; offsetY = 0;
    } else {
      renderW = cw; renderH = cw / videoAspect; offsetX = 0; offsetY = (renderH - ch) / 2;
    }
    const scale = vw / renderW;
    return { cw, ch, offsetX, offsetY, scale };
  }

  function getCropRectForEl(frameEl){
    const m = getViewportMapping();
    if(!m) return null;
    const boxRect = frameEl.getBoundingClientRect();
    const wrapRect = camWrap.getBoundingClientRect();
    let boxX = boxRect.left - wrapRect.left;
    let boxY = boxRect.top - wrapRect.top;
    let boxW = boxRect.width;
    let boxH = boxRect.height;

    if(!hasHardwareZoom && zoomLevel > 1.0){
      const cx = m.cw / 2, cy = m.ch / 2;
      const x2 = boxX + boxW, y2 = boxY + boxH;
      const ux1 = cx + (boxX - cx) / zoomLevel;
      const uy1 = cy + (boxY - cy) / zoomLevel;
      const ux2 = cx + (x2 - cx) / zoomLevel;
      const uy2 = cy + (y2 - cy) / zoomLevel;
      boxX = ux1; boxY = uy1; boxW = ux2 - ux1; boxH = uy2 - uy1;
    }
    return {
      sx: (boxX + m.offsetX) * m.scale,
      sy: (boxY + m.offsetY) * m.scale,
      sw: boxW * m.scale,
      sh: boxH * m.scale
    };
  }

  function nativeRectToContainerRect(nx, ny, nw, nh){
    const m = getViewportMapping();
    if(!m) return { left:0, top:0, width:0, height:0 };
    let ux1 = nx / m.scale - m.offsetX;
    let uy1 = ny / m.scale - m.offsetY;
    let ux2 = (nx + nw) / m.scale - m.offsetX;
    let uy2 = (ny + nh) / m.scale - m.offsetY;
    if(!hasHardwareZoom && zoomLevel > 1.0){
      const cx = m.cw / 2, cy = m.ch / 2;
      ux1 = cx + (ux1 - cx) * zoomLevel;
      uy1 = cy + (uy1 - cy) * zoomLevel;
      ux2 = cx + (ux2 - cx) * zoomLevel;
      uy2 = cy + (uy2 - cy) * zoomLevel;
    }
    return { left: ux1, top: uy1, width: ux2 - ux1, height: uy2 - uy1 };
  }

  function updateOverlayPosition(rs){
    if(!rs.el || !rs.native) return;
    const r = nativeRectToContainerRect(rs.native.nx, rs.native.ny, rs.native.nw, rs.native.nh);
    rs.el.style.left = Math.round(r.left) + "px";
    rs.el.style.top = Math.round(r.top) + "px";
    rs.el.style.width = Math.max(14, Math.round(r.width)) + "px";
    rs.el.style.height = Math.max(14, Math.round(r.height)) + "px";
  }

  // ================= Otsu 自動二值化（僅用於畫質強化，不再用於偵測） =================
  function computeOtsuThreshold(gray, n){
    const hist = new Array(256).fill(0);
    for(let i = 0; i < n; i++) hist[gray[i]]++;
    let sum = 0;
    for(let t = 0; t < 256; t++) sum += t * hist[t];
    let sumB = 0, wB = 0, varMax = 0, threshold = 127;
    for(let t = 0; t < 256; t++){
      wB += hist[t];
      if(wB === 0) continue;
      const wF = n - wB;
      if(wF === 0) break;
      sumB += t * hist[t];
      const mB = sumB / wB, mF = (sum - sumB) / wF;
      const between = wB * wF * (mB - mF) * (mB - mF);
      if(between > varMax){ varMax = between; threshold = t; }
    }
    return threshold;
  }

  function applyOtsuBinarizeToCtx(ctx, w, h){
    try{
      const imgData = ctx.getImageData(0, 0, w, h);
      const data = imgData.data;
      const n = w * h;
      const gray = new Uint8ClampedArray(n);
      for(let i = 0, p = 0; i < data.length; i += 4, p++){
        gray[p] = (data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114) | 0;
      }
      const threshold = computeOtsuThreshold(gray, n);
      let brightCount = 0;
      for(let p = 0; p < n; p++) if(gray[p] > threshold) brightCount++;
      const textIsBright = brightCount < (n - brightCount);
      for(let i = 0, p = 0; i < data.length; i += 4, p++){
        const isBright = gray[p] > threshold;
        const isText = textIsBright ? isBright : !isBright;
        const v = isText ? 0 : 255;
        data[i] = v; data[i+1] = v; data[i+2] = v;
      }
      ctx.putImageData(imgData, 0, 0);
      return true;
    }catch(e){
      console.warn("二值化失敗:", e);
      return false;
    }
  }

  // ================= 擷取整個掃描區並二值化 =================
  function captureZoneCanvas(){
    const rect = getCropRectForEl(zoneEl);
    if(!rect || rect.sw <= 10 || rect.sh <= 10) return null;
    const targetW = 1100;
    let upscale = targetW / rect.sw;
    upscale = Math.max(1.0, Math.min(upscale, 4));
    const w = Math.max(1, Math.round(rect.sw * upscale));
    const h = Math.max(1, Math.round(rect.sh * upscale));
    captureCanvas.width = w; captureCanvas.height = h;
    const ctx = captureCanvas.getContext("2d");
    ctx.drawImage(video, rect.sx, rect.sy, rect.sw, rect.sh, 0, 0, w, h);
    if(!applyOtsuBinarizeToCtx(ctx, w, h)){
      ctx.filter = "grayscale(1) contrast(1.6) brightness(1.05)";
      ctx.drawImage(video, rect.sx, rect.sy, rect.sw, rect.sh, 0, 0, w, h);
    }
    return { canvas: captureCanvas, rect, canvasW: w, canvasH: h };
  }

  // ================= 從 Tesseract 版面分析結果取出各區塊 =================
  function extractBlocks(data, capW, capH){
    const src = (data && data.blocks && data.blocks.length) ? data.blocks
              : (data && data.paragraphs && data.paragraphs.length) ? data.paragraphs
              : null;
    if(src){
      return src
        .map(b => ({ text: (b.text || "").trim(), bbox: b.bbox }))
        .filter(b => b.bbox && b.text.replace(/\s/g, "").length >= 2);
    }
    const text = (data && data.text) ? data.text.trim() : "";
    if(!text) return [];
    return [{ text, bbox: { x0: 0, y0: 0, x1: capW, y1: capH } }];
  }

  function blockToRegion(b, capture){
    const bw = b.bbox.x1 - b.bbox.x0, bh = b.bbox.y1 - b.bbox.y0;
    if(bw <= 0 || bh <= 0) return null;
    return {
      text: b.text,
      area: bw * bh,
      nx: capture.rect.sx + (b.bbox.x0 / capture.canvasW) * capture.rect.sw,
      ny: capture.rect.sy + (b.bbox.y0 / capture.canvasH) * capture.rect.sh,
      nw: (bw / capture.canvasW) * capture.rect.sw,
      nh: (bh / capture.canvasH) * capture.rect.sh
    };
  }

  // ================= 區域狀態管理（依位置自動配對追蹤） =================
  function createRegionState(){
    return {
      uid: uidCounter++, el: null, native: null,
      state: "idle", candidateText: "", stableCount: 0, emptyStreak: 0,
      lastResult: "", cmp: null, missedTicks: 0
    };
  }

  function reconcileAndProcess(regions){
    const usedOld = new Set();
    const matched = [];
    regions.forEach(r => {
      const rCenterX = r.nx + r.nw / 2, rCenterY = r.ny + r.nh / 2;
      let bestIdx = -1, bestDist = Infinity;
      regionStates.forEach((rs, idx) => {
        if(usedOld.has(idx) || !rs.native) return;
        const oldCenterX = rs.native.nx + rs.native.nw / 2;
        const oldCenterY = rs.native.ny + rs.native.nh / 2;
        const dist = Math.hypot(oldCenterX - rCenterX, oldCenterY - rCenterY);
        if(dist < bestDist){ bestDist = dist; bestIdx = idx; }
      });
      const proximityThreshold = Math.max(r.nw, r.nh) * 1.4 + 70;
      let rs;
      if(bestIdx >= 0 && bestDist < proximityThreshold){
        usedOld.add(bestIdx);
        rs = regionStates[bestIdx];
      } else {
        rs = createRegionState();
      }
      rs.native = { nx: r.nx, ny: r.ny, nw: r.nw, nh: r.nh };
      rs.missedTicks = 0;
      handleOcrResult(rs, r.text);
      matched.push(rs);
    });
    regionStates.forEach((rs, idx) => {
      if(usedOld.has(idx)) return;
      rs.missedTicks = (rs.missedTicks || 0) + 1;
      if(rs.missedTicks <= MISSING_GRACE) matched.push(rs);
    });
    matched.sort((a, b) => {
      const ax = a.native ? a.native.nx : 0, bx = b.native ? b.native.nx : 0;
      return ax - bx;
    });

    const prevUids = regionStates.map(rs => rs.uid).join(",");
    regionStates = matched;
    const newUids = regionStates.map(rs => rs.uid).join(",");
    return prevUids !== newUids;
  }

  function lockColorClass(cmp){
    if(!cmp) return "scanning";
    if(cmp.kind === "green") return "ok";
    if(cmp.kind === "yellow") return "warn";
    if(cmp.kind === "red") return "bad";
    return "scanning";
  }
  function badgeTextFor(rs){
    if(rs.state === "locked" && rs.cmp){
      if(rs.cmp.noStandards) return "無標準文字";
      if(rs.cmp.kind === "green") return "完全符合";
      if(rs.cmp.kind === "yellow") return "部分符合";
      return "完全不符";
    }
    return "偵測中";
  }
  function setSlotBadge(rs, text, kind){
    const el = document.getElementById("badge-" + rs.uid);
    if(!el) return;
    el.textContent = text;
    el.className = "badge" + (kind ? " " + kind : "");
  }

  function renderAllRegionCards(){
    scanLayer.innerHTML = "";
    resultsContainer.innerHTML = "";
    if(regionStates.length === 0){
      resultsContainer.innerHTML = '<div class="card"><div class="placeholder-dim">尚未偵測到 IC，請將晶片置於掃描區內。</div></div>';
      return;
    }
    const multi = regionStates.length > 1;
    regionStates.forEach((rs, i) => {
      const frame = document.createElement("div");
      frame.className = "auto-frame " + lockColorClass(rs.state === "locked" ? rs.cmp : null);
      if(multi){
        const label = document.createElement("div");
        label.className = "slot-label";
        label.textContent = "IC " + (i + 1);
        frame.appendChild(label);
      }
      scanLayer.appendChild(frame);
      rs.el = frame;
      updateOverlayPosition(rs);

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <h2>${multi ? ("IC " + (i + 1) + " 辨識結果") : "OCR 辨識結果"} <span class="badge" id="badge-${rs.uid}"></span></h2>
        <div class="ocr-text empty" id="ocrText-${rs.uid}">尚無辨識結果</div>
        <div class="row">
          <button class="btn primary copy-slot-btn" data-uid="${rs.uid}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"></path></svg>
            複製文字
          </button>
        </div>
        <div class="match-name" id="matchName-${rs.uid}" style="display:none;"></div>
        <div id="cmpList-${rs.uid}"><div class="placeholder-dim">辨識到文字後，將自動與標準文字逐行比對。</div></div>
      `;
      resultsContainer.appendChild(card);
      setSlotBadge(rs, badgeTextFor(rs), rs.state === "locked" ? lockColorClass(rs.cmp) : null);

      if(rs.state === "locked"){
        const ocrTextEl = document.getElementById("ocrText-" + rs.uid);
        ocrTextEl.textContent = rs.lastResult;
        ocrTextEl.classList.remove("empty");
        if(rs.cmp) renderComparison(rs, rs.cmp);
      }
    });

    resultsContainer.querySelectorAll(".copy-slot-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const uid = btn.dataset.uid;
        const rs = regionStates.find(r => String(r.uid) === uid);
        if(!rs || !rs.lastResult){ showToast("尚無文字可複製"); return; }
        copyTextToClipboard(rs.lastResult);
      });
    });
  }

  // ================= OCR 主迴圈 =================
  function scheduleTick(delay){
    clearTimeout(mainTimer);
    mainTimer = setTimeout(mainTick, delay != null ? delay : TICK_DELAY);
  }

  async function mainTick(){
    if(!stream || !workerReady || isRecognizing){ scheduleTick(); return; }
    isRecognizing = true;
    try{
      const capture = captureZoneCanvas();
      if(capture){
        const { data } = await worker.recognize(capture.canvas);
        const blocks = extractBlocks(data, capture.canvasW, capture.canvasH);
        let regions = blocks.map(b => blockToRegion(b, capture)).filter(Boolean);
        regions.sort((a, b) => b.area - a.area);
        regions = regions.slice(0, MAX_REGIONS);

        const structureChanged = reconcileAndProcess(regions);
        if(structureChanged) renderAllRegionCards();
        else regionStates.forEach(rs => updateOverlayPosition(rs));
      }
    }catch(err){
      console.error(err);
    }
    isRecognizing = false;
    updateHeaderStatus();
    scheduleTick();
  }

  function cleanText(t){
    return t.split("\n").map(l => l.trim()).filter(l => l.replace(/[^A-Za-z0-9]/g, "").length >= 2).join("\n");
  }

  function handleOcrResult(rs, rawText){
    const cleaned = cleanText(rawText);
    const meaningfulLen = cleaned.replace(/\s/g, "").length;

    if(rs.state === "idle"){
      if(meaningfulLen >= MIN_TEXT_LEN){
        if(cleaned === rs.candidateText){
          rs.stableCount++;
          setSlotBadge(rs, `校正中 ${rs.stableCount}/${STABLE_THRESHOLD}`, null);
          if(rs.stableCount >= STABLE_THRESHOLD){
            lockResult(rs, cleaned);
            rs.candidateText = ""; rs.stableCount = 0;
          }
        }else{
          rs.candidateText = cleaned; rs.stableCount = 1;
          setSlotBadge(rs, "偵測到文字", null);
        }
      }else{
        rs.candidateText = ""; rs.stableCount = 0;
        setSlotBadge(rs, "偵測中", null);
      }
    }else if(rs.state === "locked"){
      if(meaningfulLen < MIN_TEXT_LEN){
        rs.emptyStreak++;
        if(rs.emptyStreak >= EMPTY_STREAK_TO_RESET) resetRegionIdle(rs);
      }else{
        rs.emptyStreak = 0;
      }
    }
  }

  function lockResult(rs, text){
    rs.state = "locked";
    rs.emptyStreak = 0;
    rs.lastResult = text;

    const ocrTextEl = document.getElementById("ocrText-" + rs.uid);
    if(ocrTextEl){ ocrTextEl.textContent = text; ocrTextEl.classList.remove("empty"); }

    const cmp = compareAgainstStandards(text);
    rs.cmp = cmp;
    renderComparison(rs, cmp);

    if(rs.el) rs.el.className = "auto-frame " + lockColorClass(cmp);
  }

  function resetRegionIdle(rs){
    rs.state = "idle";
    rs.emptyStreak = 0; rs.candidateText = ""; rs.stableCount = 0;
    rs.lastResult = ""; rs.cmp = null;
    if(rs.el) rs.el.className = "auto-frame scanning";

    const ocrTextEl = document.getElementById("ocrText-" + rs.uid);
    if(ocrTextEl){ ocrTextEl.textContent = "尚無辨識結果"; ocrTextEl.classList.add("empty"); }
    setSlotBadge(rs, "偵測中", null);
    const matchNameEl = document.getElementById("matchName-" + rs.uid);
    if(matchNameEl) matchNameEl.style.display = "none";
    const cmpListEl = document.getElementById("cmpList-" + rs.uid);
    if(cmpListEl) cmpListEl.innerHTML = '<div class="placeholder-dim">辨識到文字後，將自動與標準文字逐行比對。</div>';
  }

  function updateHeaderStatus(){
    if(regionStates.length === 0){
      setStatus("scanning", "掃描中");
      if(stream) camStatusText.textContent = `尚未偵測到 IC　|　倍率 ${zoomLevel.toFixed(1)}x` + (hasHardwareZoom ? "" : " (數位)");
      return;
    }
    let anyBad = false, anyWarn = false, allLocked = true, lockedCount = 0;
    regionStates.forEach(rs => {
      if(rs.state === "locked"){
        lockedCount++;
        if(rs.cmp){
          if(rs.cmp.kind === "red") anyBad = true;
          else if(rs.cmp.kind === "yellow") anyWarn = true;
        }
      }else{
        allLocked = false;
      }
    });
    let kind = "scanning", label = "掃描中";
    if(anyBad){ kind = "bad"; label = "發現不符"; }
    else if(anyWarn){ kind = "warn"; label = "部分符合"; }
    else if(allLocked && lockedCount > 0){ kind = "ok"; label = "全部符合"; }
    setStatus(kind, label);
    camStatusText.textContent = `偵測到 ${regionStates.length} 顆　|　已鎖定 ${lockedCount}　|　倍率 ${zoomLevel.toFixed(1)}x` + (hasHardwareZoom ? "" : " (數位)");
  }

  // ================= 模糊比對 =================
  function normLine(l){ return l.toUpperCase().replace(/[^A-Z0-9]/g, ""); }

  function getLevenshteinDistance(a, b){
    const tmp = [];
    for(let i = 0; i <= a.length; i++) tmp[i] = [i];
    for(let j = 0; j <= b.length; j++) tmp[0][j] = j;
    for(let i = 1; i <= a.length; i++){
      for(let j = 1; j <= b.length; j++){
        tmp[i][j] = Math.min(
          tmp[i-1][j] + 1,
          tmp[i][j-1] + 1,
          tmp[i-1][j-1] + (a[i-1] === b[j-1] ? 0 : 1)
        );
      }
    }
    return tmp[a.length][b.length];
  }
  function areCharsConfusable(c1, c2){
    if(c1 === c2) return true;
    const sets = [["8","B","E"], ["0","O","D","Q","G"], ["1","I","L","T","J"], ["5","S"], ["2","Z"]];
    for(const set of sets){ if(set.includes(c1) && set.includes(c2)) return true; }
    return false;
  }
  function isFuzzyMatch(std, ocr){
    const nStd = normLine(std), nOcr = normLine(ocr);
    if(!nStd || !nOcr) return false;
    if(nStd === nOcr) return true;
    if(nStd.length >= 4 && (nOcr.includes(nStd) || nStd.includes(nOcr))) return true;
    if(Math.abs(nStd.length - nOcr.length) <= 2){
      const dist = getLevenshteinDistance(nStd, nOcr);
      if(dist <= 2){
        let unpardonable = 0;
        const maxLen = Math.max(nStd.length, nOcr.length);
        for(let i = 0; i < maxLen; i++){
          const sC = nStd[i] || "", oC = nOcr[i] || "";
          if(sC !== oC && !areCharsConfusable(sC, oC)) unpardonable++;
        }
        if(unpardonable <= 1) return true;
      }
    }
    return false;
  }

  function compareAgainstStandards(ocrTextRaw){
    if(standards.length === 0) return { kind: "gray", stdName: null, lines: [], noStandards: true };
    const ocrLines = ocrTextRaw.split("\n").filter(l => l.trim().length > 0);
    let best = null;
    standards.forEach(s => {
      const stdLines = s.text.split("\n").map(l => l.trim()).filter(l => l.length > 0);
      if(stdLines.length === 0) return;
      const lineResults = stdLines.map(stdLine => {
        let matchedOcrLine = null;
        for(let i = 0; i < ocrLines.length; i++){
          if(isFuzzyMatch(stdLine, ocrLines[i])){ matchedOcrLine = ocrLines[i]; break; }
        }
        return { std: stdLine, matched: matchedOcrLine !== null, got: matchedOcrLine };
      });
      const matchCount = lineResults.filter(r => r.matched).length;
      const ratio = matchCount / stdLines.length;
      if(!best || ratio > best.ratio) best = { ratio, stdName: s.name, lines: lineResults };
    });
    if(!best) return { kind: "gray", stdName: null, lines: [], noStandards: true };
    let kind = "red";
    if(best.ratio >= 0.99) kind = "green";
    else if(best.ratio > 0) kind = "yellow";
    return { kind, stdName: best.stdName, lines: best.lines, ratio: best.ratio };
  }

  function renderComparison(rs, cmp){
    const matchNameEl = document.getElementById("matchName-" + rs.uid);
    const cmpListEl = document.getElementById("cmpList-" + rs.uid);
    if(!matchNameEl || !cmpListEl) return;

    if(cmp.noStandards){
      matchNameEl.style.display = "none";
      setSlotBadge(rs, "無標準文字", null);
      cmpListEl.innerHTML = '<div class="placeholder-dim">請先在下方新增標準文字以進行比對。</div>';
      return;
    }
    matchNameEl.style.display = "block";
    matchNameEl.textContent = "比對對象：" + cmp.stdName;

    if(cmp.kind === "green") setSlotBadge(rs, "完全符合", "ok");
    else if(cmp.kind === "yellow") setSlotBadge(rs, "部分符合", "warn");
    else setSlotBadge(rs, "完全不符", "bad");

    cmpListEl.innerHTML = "";
    cmp.lines.forEach(r => {
      const row = document.createElement("div");
      row.className = "cmp-line " + (r.matched ? "match" : "mismatch");
      const icon = document.createElement("div");
      icon.className = "cmp-icon";
      icon.innerHTML = r.matched
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';
      const textWrap = document.createElement("div");
      textWrap.className = "cmp-text";
      const stdDiv = document.createElement("div");
      stdDiv.className = "std";
      stdDiv.textContent = r.std;
      textWrap.appendChild(stdDiv);
      if(!r.matched){
        const gotDiv = document.createElement("div");
        gotDiv.className = "got";
        gotDiv.textContent = "（未在辨識結果中找到對應行）";
        textWrap.appendChild(gotDiv);
      }else if(r.std !== r.got){
        const gotDiv = document.createElement("div");
        gotDiv.className = "got";
        gotDiv.style.color = "var(--warn)";
        gotDiv.textContent = `（相近字校正成功 ➔ 抓取到: "${r.got}"）`;
        textWrap.appendChild(gotDiv);
      }
      row.appendChild(icon); row.appendChild(textWrap);
      cmpListEl.appendChild(row);
    });
  }

  // ================= 截圖 =================
  shotBtn.addEventListener("click", () => {
    if(!stream){ showToast("請先啟動相機"); return; }
    shotCanvas.width = video.videoWidth;
    shotCanvas.height = video.videoHeight;
    const ctx = shotCanvas.getContext("2d");
    ctx.drawImage(video, 0, 0, shotCanvas.width, shotCanvas.height);
    shotCanvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const ts = new Date().toISOString().replace(/[:.]/g, "-");
      a.href = url; a.download = "ic-scan-" + ts + ".png";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 2000);
      showToast("截圖已儲存");
    }, "image/png");
  });

  // ================= init =================
  loadStandards();
})();
</script>
</body>
</html>
