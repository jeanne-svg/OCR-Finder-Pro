<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OCR Finder Pro</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #111;
  color: white;
  padding: 30px;
}

h1 {
  font-size: 32px;
}

.box {
  margin-top: 40px;
  padding: 30px;
  border-radius: 15px;
  background: #222;
}

.ok {
  color: #00ff66;
  font-size: 50px;
}

.ng {
  color: red;
  font-size: 50px;
}
</style>

</head>

<body>

<h1>🔍 OCR Finder Pro</h1>

<div class="box">

<p>文字掃描檢查</p>
  
<button onclick="openCamera()">
📷 開啟相機
  
</button>

<video id="camera" autoplay playsinline></video>
<p class="ok">
  
準備完成
</p>

<p>
🟩 OK（不震動）<br>
🟥 NG（震動）
</p>

</div>

<script>
function openCamera() {

navigator.mediaDevices.getUserMedia({
    video: {
        facingMode: "environment"
    }
})
.then(function(stream){

    document.getElementById("camera").srcObject = stream;

})
.catch(function(error){

    alert("無法開啟相機：" + error);

});

}
</script>
  
</body>
</html>
