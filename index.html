<!DOCTYPE html>
<html lang="zh-TW">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OCR Finder Pro</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
    font-family:Arial;
    text-align:center;
    background:#111;
    color:white;
    padding:20px;
}

input{
    width:80%;
    padding:12px;
    font-size:18px;
    border-radius:10px;
}

button{
    padding:12px 20px;
    margin:8px;
    font-size:18px;
    border-radius:10px;
}

video{
    width:100%;
    margin-top:20px;
}

li{
    list-style:none;
    background:#222;
    margin:8px;
    padding:10px;
    border-radius:8px;
}

.delete{
    float:right;
    background:red;
    color:white;
}

#status{
    font-size:50px;
    margin-top:20px;
}

</style>

</head>


<body>

<h1>🔍 OCR Finder Pro</h1>


<h3>新增檢查文字</h3>

<input id="textInput" placeholder="例如 ABC123">

<br>

<button onclick="addText()">
➕ 新增
</button>


<h3>文字清單</h3>

<ul id="list"></ul>


<hr>


<h3>📷 相機掃描</h3>

<button onclick="openCamera()">
開啟相機
</button>


<video id="camera" autoplay playsinline></video>


<h3>辨識結果</h3>

<div id="ocrText">
等待掃描...
</div>


<div id="status">
</div>



<script>


let items =
JSON.parse(localStorage.getItem("ocrList")) || [];



function save(){

localStorage.setItem(
"ocrList",
JSON.stringify(items)
);

}



function showList(){

let list =
document.getElementById("list");

list.innerHTML="";


items.forEach(function(item,index){

let li=document.createElement("li");

li.innerHTML =
item +
' <button class="delete" onclick="deleteText('+index+')">刪除</button>';

list.appendChild(li);

});

}



function addText(){

let input =
document.getElementById("textInput");


let value =
input.value.trim();


if(value){

items.push(value);

save();

showList();

input.value="";

}

}



function deleteText(index){

items.splice(index,1);

save();

showList();

}



showList();



let video =
document.getElementById("camera");



function openCamera(){

navigator.mediaDevices.getUserMedia({

video:{
facingMode:"environment"
}

})

.then(function(stream){

video.srcObject=stream;

})

.catch(function(error){

alert(error);

});

}





function scanOCR(){


if(video.videoWidth===0){
return;
}


let canvas =
document.createElement("canvas");


canvas.width =
video.videoWidth;


canvas.height =
video.videoHeight;


let ctx =
canvas.getContext("2d");

ctx.filter = "contrast(200%) grayscale(100%)";

ctx.drawImage(
video,
0,
0,
canvas.width,
canvas.height
);



Tesseract.recognize(

canvas,

'eng'

)

.then(function(result){


let text =
result.data.text
.toUpperCase()
.replace(/\s/g,'');



document.getElementById("ocrText").innerHTML =
text;



check(text);



});


}




function check(text){


let ok =
items.some(function(item){

return text.includes(
item.toUpperCase().replace(/\s/g,'')
);

});



let status =
document.getElementById("status");


if(ok){

    status.innerHTML="🟩 OK";
    status.style.color="lime";

    // OK：震動1下
    if(navigator.vibrate){
        navigator.vibrate(200);
    }


}else{

    status.innerHTML="🟥 NG";
    status.style.color="red";

    // NG：連續震動2下
    if(navigator.vibrate){
        navigator.vibrate([200,100,200]);
    }

}


}




setInterval(scanOCR,3000);



</script>


</body>
</html>
