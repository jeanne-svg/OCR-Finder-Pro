<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OCR Finder Pro</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background:#111;
    color:white;
    padding:20px;
}

input {
    width:80%;
    padding:12px;
    font-size:18px;
    border-radius:10px;
    border:none;
}

button {
    padding:10px 20px;
    margin:10px;
    font-size:18px;
    border-radius:10px;
}

li {
    list-style:none;
    background:#222;
    margin:8px;
    padding:10px;
    border-radius:8px;
}

.delete {
    background:red;
    color:white;
    float:right;
}
</style>

</head>

<body>

<h1>🔍 OCR Finder Pro</h1>

<h3>新增檢查文字</h3>

<input id="textInput" placeholder="例如 ABC123">

<br>

<button onclick="addText()">
➕ 新增
</button>


<h3>目前清單</h3>

<ul id="list"></ul>

<h3>📷 相機掃描</h3>

<button onclick="openCamera()">
開啟相機
</button>

<br>

<video id="camera"
width="100%"
autoplay
playsinline>
</video>
    
<script>

let items = JSON.parse(localStorage.getItem("ocrList")) || [];


function save(){

    localStorage.setItem(
        "ocrList",
        JSON.stringify(items)
    );

}


function showList(){

    let list =
    document.getElementById("list");

    list.innerHTML="";


    items.forEach(function(item,index){

        let li=document.createElement("li");

        li.innerHTML =
        item +
        '<button class="delete" onclick="deleteText('+index+')">刪除</button>';

        list.appendChild(li);

    });

}


function addText(){

    let input =
    document.getElementById("textInput");


    let value=input.value.trim();


    if(value){

        items.push(value);

        save();

        showList();

        input.value="";

    }

}


function deleteText(index){

    items.splice(index,1);

    save();

    showList();

}


showList();


</script>


</body>
</html>
