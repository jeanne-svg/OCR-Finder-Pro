<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IC 規格比對自動掃描系統</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
  <style>
    :root {
      /* 原生深黑底、藍綠色系版面配色 */
      --bg-color: #030712;       /* 極致深黑底 */
      --panel-bg: #111827;       /* 深灰黑面板 */
      --border-color: #1f2937;   /* 暗色邊框 */
      --text-main: #f3f4f6;      /* 純白偏亮文字 */
      --text-dim: #9ca3af;       /* 暗灰文字 */
      
      --brand-primary: #10b981;  /* 主題螢光綠/綠色 (或科技藍，這裡採用藍綠高對比) */
      --brand-blue: #3b82f6;     /* 科技藍 */
      --brand-hover: #059669;    /* 綠色懸停 */
      
      --status-ok: #10b981;      /* 通過：綠色 */
      --status-warn: #f59e0b;    /* 警告：橘黃 */
      --status-bad: #ef4444;     /* 失敗：紅色 */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 16px;
      line-height: 1.5;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--brand-blue); /* 科技藍主標題 */
      text-shadow: 0 2px 10px rgba(59, 130, 246, 0.3);
    }
    header p {
      font-size: 0.875rem;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (min-width: 992px) {
      .main-grid {
        grid-template-columns: 1.2fr 0.8fr;
      }
    }

    .panel {
      background-color: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
    }

    /* 相機畫面 */
    .cam-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      background-color: #000000;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 12px;
      border: 1px solid var(--border-color);
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1);
      transform-origin: center;
      transition: transform 0.1s ease-out;
    }

    .cam-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #000000;
      color: var(--text-dim);
      z-index: 5;
    }

    .start-btn {
      margin-top: 12px;
      background-color: var(--brand-blue);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: background-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
    }
    .start-btn:hover {
      background-color: #2563eb;
    }

    /* 掃描框 */
    .scan-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 80%;
      height: 40%;
      transform: translate(-50%, -50%);
      border: 2px dashed rgba(59, 130, 246, 0.5); /* 預設藍色虛線 */
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.75);
      z-index: 10;
      pointer-events: none;
      border-radius: 4px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .scan-frame.scanning {
      border-color: var(--brand-blue);
      border-style: solid;
    }
    .scan-frame.ok {
      border-color: var(--status-ok);
      border-style: solid;
      box-shadow: 0 0 0 9999px rgba(16, 185, 129, 0.2);
    }
    .scan-frame.warn {
      border-color: var(--status-warn);
      border-style: solid;
      box-shadow: 0 0 0 9999px rgba(245, 158, 11, 0.2);
    }
    .scan-frame.bad {
      border-color: var(--status-bad);
      border-style: solid;
      box-shadow: 0 0 0 9999px rgba(239, 108, 108, 0.2);
    }

    /* 掃描雷射紅/綠線 */
    .scan-line {
      position: absolute;
      left: 0;
      width: 100%;
      height: 2px;
      background-color: var(--brand-blue);
      display: none;
      z-index: 11;
      box-shadow: 0 0 8px var(--brand-blue);
    }
    .scan-line.active {
      display: block;
      animation: scan-anim 2s infinite linear;
    }
    @keyframes scan-anim {
      0% { top: 30%; }
      50% { top: 70%; }
      100%
