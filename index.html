<!DOCTYPE html>
<html lang="zh-TW">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OCR Finder Pro V2</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
padding:20px;
}

button{
font-size:18px;
padding:12px 20px;
margin:8px;
border-radius:10px;
}

video{
width:100%;
margin-top:20px;
}

#result{
font-size:45px;
margin:20px;
}

.box{
background:#222;
padding:15px;
border-radius:12px;
margin-top:20px;
}

</style>

</head>


<body>


<h1>🔍 OCR Finder Pro V2</h1>


<div class="box">

<h3>📌 標準文字</h3>

<input id="standardInput"
placeholder="輸入標準文字">

<br>

<button onclick="saveStandard()">
保存標準
</button>

<p id="standardShow">
未設定
</p>

</div>



<div class="box">

<h3>📷 掃描</h3>


<button onclick="openCamera()">
開啟相機
</button>


<button onclick="takePhoto()">
截圖
</button>


<button onclick="scanOCR()">
開始檢查
</button>


<video id="video" autoplay playsinline></video>


</div>



<div class="box">

<h3>OCR結果</h3>

<div id="text">
等待...
</div>


</div>



<div id="result">

</div>



<script>


let video =
document.getElementById("video");


let standard =
localStorage.getItem("standard") || "";



if(standard){

standardShow.innerHTML =
standard;

}




function saveStandard(){

standard =
document.getElementById("standardInput").value;


localStorage.setItem(
"standard",
standard
);


document.getElementById("standardShow").innerHTML =
standard;


}



function openCamera(){


navigator.mediaDevices.getUserMedia({

video:{
facingMode:"environment"
}

})

.then(stream=>{

video.srcObject=stream;

})

}




function takePhoto(){


let canvas =
document.createElement("canvas");


canvas.width =
video.videoWidth;


canvas.height =
video.videoHeight;


let ctx =
canvas.getContext("2d");


ctx.drawImage(
video,
0,
0
);


let link =
document.createElement("a");


link.download =
"IC_check.jpg";


link.href =
canvas.toDataURL();


link.click();


}



async function scanOCR(){


let canvas =
document.createElement("canvas");


canvas.width =
video.videoWidth;


canvas.height =
video.videoHeight;


let ctx =
canvas.getContext("2d");


// 增強文字
ctx.filter =
"grayscale(100%) contrast(200%)";


ctx.drawImage(
video,
0,
0
);



let result =
await Tesseract.recognize(

canvas,

'eng'

);



let text =
result.data.text.trim();



document.getElementById("text").innerHTML =
text.replace(/\n/g,"<br>");



check(text);


}



function normalize(t){

return t
.toUpperCase()
.replace(/\s/g,'');

}




function check(text){


let ok =
normalize(text)
.includes(
normalize(standard)
);



let result =
document.getElementById("result");



if(ok){


result.innerHTML="🟩 OK";


if(navigator.vibrate){

navigator.vibrate(200);

}


}else{


result.innerHTML="🟥 NG";


if(navigator.vibrate){

navigator.vibrate([200,100,200]);

}


}


}



</script>


</body>
</html>
